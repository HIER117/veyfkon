<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#0f172a,#0b0f1a);
    color: #e5e7eb;
    overflow-x:hidden;
}

nav {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(15,23,42,0.9);
    backdrop-filter:blur(8px);
    padding:20px 12%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

nav ul {
    display:flex;
    gap:30px;
    list-style:none;
}

nav a {
    text-decoration:none;
    color:#94a3b8;
    font-size:14px;
    transition:0.3s;
}

nav a:hover {
    color:#38bdf8;
}

section {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:120px 12% 80px 12%;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.left {
    width:55%;
}

.right {
    width:40%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.image-placeholder {
    width:100%;
    height:280px;
    border:2px dashed rgba(56,189,248,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#38bdf8;
    opacity:0.5;
}

h1 {
    font-size:52px;
    font-weight:700;
    margin-bottom:20px;
}

h2 {
    font-size:32px;
    font-weight:600;
    margin-bottom:25px;
    color:#38bdf8;
}

p, li {
    font-size:18px;
    line-height:1.7;
    max-width:700px;
}

ul {list-style:none;}
ul li::before {content:"— "; color:#38bdf8;}

.hero span {color:#38bdf8;}

footer {
    text-align:center;
    padding:40px;
    font-size:14px;
    color:#6b7280;
}

@media(max-width:900px){
    section {
        flex-direction:column;
        text-align:center;
    }
    .left, .right {
        width:100%;
    }
    .right {
        margin-top:40px;
    }
}
</style>
